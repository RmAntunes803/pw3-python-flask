
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e8f5e9, #c8e6c9);
        }

        header {
            background-color: #1b5e20;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .form-container {
            background-color: white;
            width: 90%;
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #1b5e20;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #2e7d32;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #43a047;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #2e7d32;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #1b5e20;
            text-decoration: none;
            font-weight: bold;
        }

        .voltar:hover {
            text-decoration: underline;
        }

        table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background-color: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

        th {
    background-color: #2e7d32;
    color: white;
    padding: 10px;
    font-size: 14px;
    }

        td {
    padding: 10px;
    text-align: center;
    font-size: 14px;
    border-bottom: 1px solid #ddd;
    }

        tr:hover {
    background-color: #f1f8f4;
    }
    </style>
</head>
<body>

    <header>
        <h1>🎣 Cadastro - RM Pesca</h1>
    </header>

    <div class="form-container">
        <h2>Crie sua conta</h2>

       <form action="{{ url_for('formulario') }}" method="POST">
            <label>Nome</label>
            <input type="text" name="nome" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Senha</label>
            <input type="password" name="senha" required>

            <button type="submit">Cadastrar</button>
            </form>
       
      
                <h2>Usuários cadastrados</h2>

                <table border="1">
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Senha</th>
                </tr>

                {% for u in usuarios %}
                <tr>
                    <td>{{ u.nome }}</td>
                    <td>{{ u.email }}</td>
                    <td>{{ u.senha }}</td>
                </tr>
                {% endfor %}
            </table>
        

        <a class="voltar" href="{{url_for('home')}}">← Voltar para o início</a>
    </div>
    
</body>
</html>
